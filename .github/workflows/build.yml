name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.29.0'

jobs:
  build-windows:
    name: Windows Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      # === 关键优化: Release 模式 + Tree Shaking ===
      - name: Build Windows (Release)
        run: |
          flutter build windows `
            --release `
            --tree-shake-icons `
            --obfuscate `
            --split-debug-info=debug-info

      # 打包为 zip (只包含运行所需文件, 排除 debug-info)
      - name: Package Windows
        run: |
          mkdir package
          cp -r build/windows/x64/runner/Release/* package/
          cd package
          7z a ../GitHub-Store-Flutter-Windows.zip *
          cd ..

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: GitHub-Store-Flutter-Windows.zip

      - name: Get file size
        run: |
          $size = (Get-Item "GitHub-Store-Flutter-Windows.zip").Length / 1MB
          Write-Host "Windows zip size: $([math]::Round($size, 2)) MB"
          $folderSize = (Get-ChildItem -Recurse package | Measure-Object -Property Length -Sum).Sum / 1MB
          Write-Host "Windows folder size: $([math]::Round($folderSize, 2)) MB"

  build-macos:
    name: macOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build macOS (Release)
        run: |
          flutter build macos \
            --release \
            --tree-shake-icons

      - name: Build macOS (Release)
        run: |
          flutter build macos --release --tree-shake-icons

      - name: Optimize & Package macOS ARM64
        run: |
          APP_PATH="build/macos/Build/Products/Release/github_store_flutter.app"
          FRAMEWORKS="$APP_PATH/Contents/Frameworks"

          echo "=== Step 1: Strip debug symbols ==="
          for framework in "$FRAMEWORKS"/*.framework; do
            if [ -d "$framework" ]; then
              BINARY_NAME="$(basename "$framework" .framework)"
              for BINARY_PATH in "$framework/$BINARY_NAME" "$framework/Versions/A/$BINARY_NAME"; do
                if [ -f "$BINARY_PATH" ]; then
                  strip -x -S "$BINARY_PATH" 2>/dev/null || true
                fi
              done
            fi
          done
          for dylib in "$FRAMEWORKS"/*.dylib; do
            if [ -f "$dylib" ]; then
              strip -x -S "$dylib" 2>/dev/null || true
            fi
          done

          echo "=== Step 2: Thin to ARM64 only ==="
          for framework in "$FRAMEWORKS"/*.framework; do
            if [ -d "$framework" ]; then
              BINARY_NAME="$(basename "$framework" .framework)"
              for BINARY_PATH in "$framework/Versions/A/$BINARY_NAME" "$framework/$BINARY_NAME"; do
                if [ -f "$BINARY_PATH" ]; then
                  ARCHS=$(lipo -info "$BINARY_PATH" 2>/dev/null || echo "single")
                  if echo "$ARCHS" | grep -q "arm64.*x86_64\|x86_64.*arm64"; then
                    lipo -thin arm64 -output "$BINARY_PATH" "$BINARY_PATH" 2>/dev/null || true
                  fi
                fi
              done
            fi
          done
          for dylib in "$FRAMEWORKS"/*.dylib; do
            if [ -f "$dylib" ]; then
              ARCHS=$(lipo -info "$dylib" 2>/dev/null || echo "single")
              if echo "$ARCHS" | grep -q "arm64.*x86_64\|x86_64.*arm64"; then
                lipo -thin arm64 -output "$dylib" "$dylib" 2>/dev/null || true
              fi
            fi
          done

          echo "=== Step 3: Remove system Swift dylibs ==="
          rm -f "$FRAMEWORKS"/libswift*.dylib

          echo "=== Step 4: Remove dSYM files ==="
          find "$APP_PATH" -name "*.dSYM" -type d -exec rm -rf {} + 2>/dev/null || true

          echo "=== Step 5: Re-sign after strip/lipo ==="
          codesign --force --deep --sign - "$APP_PATH"

          echo "=== Step 6: Rebuild framework symlinks ==="
          for framework in "$FRAMEWORKS"/*.framework; do
            if [ -d "$framework" ]; then
              BINARY_NAME="$(basename "$framework" .framework)"
              if [ -d "$framework/Versions" ]; then
                rm -f "$framework/Versions/Current"
                ln -s A "$framework/Versions/Current"
                rm -f "$framework/$BINARY_NAME"
                ln -s "Versions/Current/$BINARY_NAME" "$framework/$BINARY_NAME"
                if [ -d "$framework/Versions/A/Resources" ]; then
                  rm -f "$framework/Resources"
                  ln -s "Versions/Current/Resources" "$framework/Resources"
                fi
              fi
            fi
          done

          echo "=== Step 7: Package ==="
          mkdir -p package/github_store_flutter.app
          cp -r "$APP_PATH"/* package/github_store_flutter.app/
          cd package
          zip -r -9 -y ../GitHub-Store-Flutter-macOS-ARM64.zip github_store_flutter.app/
          cd ..

          echo "macOS zip size: $(du -sh GitHub-Store-Flutter-macOS-ARM64.zip | cut -f1)"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: GitHub-Store-Flutter-macOS-ARM64.zip
          cd ..

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: GitHub-Store-Flutter-macOS.zip

      - name: Get file size
        run: |
          echo "macOS zip size: $(du -sh GitHub-Store-Flutter-macOS.zip | cut -f1)"

  build-linux:
    name: Linux Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libayatana-appindicator3-dev libsecret-1-dev

      - name: Get dependencies
        run: flutter pub get

      - name: Build Linux (Release)
        run: |
          flutter build linux \
            --release \
            --tree-shake-icons

      - name: Package Linux
        run: |
          mkdir -p package
          cp -r build/linux/x64/release/bundle/* package/
          cd package
          tar -czf ../GitHub-Store-Flutter-Linux.tar.gz *
          cd ..

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: GitHub-Store-Flutter-Linux.tar.gz

      - name: Get file size
        run: |
          echo "Linux tar.gz size: $(du -sh GitHub-Store-Flutter-Linux.tar.gz | cut -f1)"

  # 发布 Release
  release:
    name: Create Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List files
        run: |
          echo "=== 打包文件大小 ==="
          ls -lh artifacts/windows-release/GitHub-Store-Flutter-Windows.zip
          ls -lh artifacts/macos-release/GitHub-Store-Flutter-macOS.zip
          ls -lh artifacts/linux-release/GitHub-Store-Flutter-Linux.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows-release/GitHub-Store-Flutter-Windows.zip
            artifacts/macos-release/GitHub-Store-Flutter-macOS.zip
            artifacts/linux-release/GitHub-Store-Flutter-Linux.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
