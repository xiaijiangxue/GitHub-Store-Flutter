name: github_store_flutter
description: A feature-rich GitHub Store desktop application for discovering, browsing, and managing GitHub repositories.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  hooks_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.0

  # Networking
  dio: ^5.4.3

  # Database
  sqlite3: ^2.4.5
  sqlite3_flutter_libs: ^0.5.24

  # Serialization
  json_annotation: ^4.9.0
#  freezed_annotation: ^2.4.3

  # Markdown
  flutter_markdown: ^0.7.3

  # Image Loading
  cached_network_image: ^3.3.1

  # Simple Settings
  shared_preferences: ^2.2.3

  # Crypto
  crypto: ^3.0.3

  # URL Launcher
  url_launcher: ^6.2.6

  # Share (桌面端可选, 不需要可注释掉)
  share_plus: ^12.0.2

  # File Paths
  path_provider: ^2.1.3

  # Permission Handler (桌面端不需要)
  # permission_handler: ^11.3.1

  # Internationalization
  intl: ^0.19.0

  # Fonts (用本地字体替代 google_fonts, 减少 ~5MB 下载)
  # google_fonts: ^6.2.1

  # Clipboard
  clipboard_watcher: ^0.2.0

  # Window Management
  window_manager: ^0.4.2

  # System Tray
  system_tray: ^2.0.3

  # Process Execution
  process_run: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code Generation
  build_runner: ^2.4.11
  json_serializable: ^6.8.0
#  freezed: ^2.5.2

  # Testing
  mockito: ^5.4.4
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
