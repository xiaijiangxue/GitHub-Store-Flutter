name: Build & Release (macOS ARM64 only)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.29.0'

jobs:
  build-macos:
    name: macOS Build (ARM64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build macOS (Release)
        run: |
          flutter build macos --release --tree-shake-icons

      - name: Optimize & Package
        run: |
          APP_PATH="build/macos/Build/Products/Release/github_store_flutter.app"
          FRAMEWORKS="$APP_PATH/Contents/Frameworks"

          echo "=== Step 1: Strip debug symbols ==="
          for framework in "$FRAMEWORKS"/*.framework; do
            if [ -d "$framework" ]; then
              BINARY_NAME="$(basename "$framework" .framework)"
              for BINARY_PATH in "$framework/$BINARY_NAME" "$framework/Versions/A/$BINARY_NAME"; do
                if [ -f "$BINARY_PATH" ]; then
                  strip -x -S "$BINARY_PATH" 2>/dev/null || true
                fi
              done
            fi
          done
          for dylib in "$FRAMEWORKS"/*.dylib; do
            if [ -f "$dylib" ]; then
              strip -x -S "$dylib" 2>/dev/null || true
            fi
          done

          echo "=== Step 2: Thin to ARM64 only ==="
          for framework in "$FRAMEWORKS"/*.framework; do
            if [ -d "$framework" ]; then
              BINARY_NAME="$(basename "$framework" .framework)"
              for BINARY_PATH in "$framework/Versions/A/$BINARY_NAME" "$framework/$BINARY_NAME"; do
                if [ -f "$BINARY_PATH" ]; then
                  ARCHS=$(lipo -info "$BINARY_PATH" 2>/dev/null || echo "single")
                  if echo "$ARCHS" | grep -q "arm64.*x86_64\|x86_64.*arm64"; then
                    lipo -thin arm64 -output "$BINARY_PATH" "$BINARY_PATH" 2>/dev/null || true
                  fi
                fi
              done
            fi
          done
          for dylib in "$FRAMEWORKS"/*.dylib; do
            if [ -f "$dylib" ]; then
              ARCHS=$(lipo -info "$dylib" 2>/dev/null || echo "single")
              if echo "$ARCHS" | grep -q "arm64.*x86_64\|x86_64.*arm64"; then
                lipo -thin arm64 -output "$dylib" "$dylib" 2>/dev/null || true
              fi
            fi
          done

          echo "=== Step 3: Remove system Swift dylibs ==="
          rm -f "$FRAMEWORKS"/libswift*.dylib

          echo "=== Step 4: Remove dSYM files ==="
          find "$APP_PATH" -name "*.dSYM" -type d -exec rm -rf {} + 2>/dev/null || true

          echo "=== Step 5: Re-sign after strip/lipo ==="
          codesign --force --deep --sign - "$APP_PATH"

          echo "=== Step 6: Rebuild framework symlinks ==="
          for framework in "$FRAMEWORKS"/*.framework; do
            if [ -d "$framework" ]; then
              BINARY_NAME="$(basename "$framework" .framework)"
              if [ -d "$framework/Versions" ]; then
                rm -f "$framework/Versions/Current"
                ln -s A "$framework/Versions/Current"
                rm -f "$framework/$BINARY_NAME"
                ln -s "Versions/Current/$BINARY_NAME" "$framework/$BINARY_NAME"
                if [ -d "$framework/Versions/A/Resources" ]; then
                  rm -f "$framework/Resources"
                  ln -s "Versions/Current/Resources" "$framework/Resources"
                fi
              fi
            fi
          done

          echo "=== Step 7: Package ==="
          mkdir -p package/github_store_flutter.app
          cp -r "$APP_PATH"/* package/github_store_flutter.app/
          cd package
          zip -r -9 -y ../GitHub-Store-Flutter-macOS-ARM64.zip github_store_flutter.app/

      - name: Report Size
        run: |
          echo "macOS ARM64 ZIP: $(du -sh GitHub-Store-Flutter-macOS-ARM64.zip | cut -f1)"
          echo ""
          echo "=== Framework Breakdown ==="
          du -sh build/macos/Build/Products/Release/github_store_flutter.app/Contents/Frameworks/* 2>/dev/null | sort -rh | head -8

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: GitHub-Store-Flutter-macOS-ARM64.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "Creating release for ${{ github.ref }}"

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: GitHub-Store-Flutter-macOS-ARM64.zip
          generate_release_notes: true
          draft: false
          prerelease: false
