name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.22.0'

jobs:
  build-windows:
    name: Windows Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      # Release 模式构建 + Tree Shaking + 代码混淆
      - name: Build Windows (Release)
        run: |
          flutter build windows --release --tree-shake-icons

      # 清理 debug 文件，减小体积
      - name: Clean & Package Windows
        run: |
          $releaseDir = "build\windows\x64\runner\Release"
          # 删除 PDB 调试符号文件
          Remove-Item "$releaseDir\*.pdb" -Force -ErrorAction SilentlyContinue
          # 删除 data 目录（如果存在）
          if (Test-Path "$releaseDir\data") {
            Remove-Item "$releaseDir\data\*" -Force -ErrorAction SilentlyContinue
          }
          mkdir package
          Copy-Item -Recurse "$releaseDir\*" package\
          cd package
          & 7z a -mx=9 ..\GitHub-Store-Flutter-Windows.zip *
          cd ..

      - name: Report Size
        run: |
          $zipSize = (Get-Item "GitHub-Store-Flutter-Windows.zip").Length / 1MB
          Write-Host "=== Windows Build Size ==="
          Write-Host "ZIP: $([math]::Round($zipSize, 2)) MB"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: GitHub-Store-Flutter-Windows.zip

  build-macos:
    name: macOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      # Release 模式构建
      - name: Build macOS (Release)
        run: |
          flutter build macos --release --tree-shake-icons

      # Strip 调试符号 + 清理 + 打包
      - name: Strip & Package macOS
        run: |
          APP_PATH="build/macos/Build/Products/Release/github_store_flutter.app"
          FRAMEWORKS="$APP_PATH/Contents/Frameworks"

          echo "=== Stripping debug symbols ==="

          # Strip .framework binaries
          for framework in "$FRAMEWORKS"/*.framework; do
            if [ -d "$framework" ]; then
              BINARY_NAME="$(basename "$framework" .framework)"
              BINARY_PATH="$framework/$BINARY_NAME"
              if [ -f "$BINARY_PATH" ]; then
                echo "Stripping: $(basename "$framework")"
                strip -x -S "$BINARY_PATH" 2>/dev/null || true
              fi
            fi
          done

          # Strip .dylib files
          for dylib in "$FRAMEWORKS"/*.dylib; do
            if [ -f "$dylib" ]; then
              echo "Stripping: $(basename "$dylib")"
              strip -x -S "$dylib" 2>/dev/null || true
            fi
          done

          # Remove dSYM files
          find "$APP_PATH" -name "*.dSYM" -type d -exec rm -rf {} + 2>/dev/null || true

          # Get app size before packaging
          BEFORE=$(du -sh "$APP_PATH" | cut -f1)
          echo "App bundle size: $BEFORE"

          # Create deep-optimized zip
          mkdir -p package
          cp -r "$APP_PATH" package/
          cd package
          zip -r -9 -y ../GitHub-Store-Flutter-macOS.zip github_store_flutter.app/
          cd ..

      - name: Report Size
        run: |
          ZIP_SIZE=$(du -sh GitHub-Store-Flutter-macOS.zip | cut -f1)
          echo "=== macOS Build Size ==="
          echo "ZIP: $ZIP_SIZE"
          echo ""
          echo "=== Framework Breakdown ==="
          du -sh build/macos/Build/Products/Release/github_store_flutter.app/Contents/Frameworks/* 2>/dev/null | sort -rh | head -8

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: GitHub-Store-Flutter-macOS.zip

  build-linux:
    name: Linux Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libayatana-appindicator3-dev libsecret-1-dev

      - name: Get dependencies
        run: flutter pub get

      - name: Build Linux (Release)
        run: |
          flutter build linux --release --tree-shake-icons

      # Strip + Package
      - name: Strip & Package Linux
        run: |
          BUNDLE_DIR="build/linux/x64/release/bundle"

          # Strip debug symbols from all binaries
          echo "=== Stripping debug symbols ==="
          for lib in "$BUNDLE_DIR"/lib/*.so; do
            if [ -f "$lib" ]; then
              echo "Stripping: $(basename "$lib")"
              strip --strip-unneeded "$lib" 2>/dev/null || true
            fi
          done

          # Strip the main executable
          strip --strip-unneeded "$BUNDLE_DIR/github_store_flutter" 2>/dev/null || true

          # Remove debug info
          rm -rf "$BUNDLE_DIR/debug" "$BUNDLE_DIR/lib/debug" 2>/dev/null || true

          mkdir -p package
          cp -r "$BUNDLE_DIR"/* package/
          cd package
          tar -czf ../GitHub-Store-Flutter-Linux.tar.gz *
          cd ..

      - name: Report Size
        run: |
          TAR_SIZE=$(du -sh GitHub-Store-Flutter-Linux.tar.gz | cut -f1)
          echo "=== Linux Build Size ==="
          echo "TAR.GZ: $TAR_SIZE"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: GitHub-Store-Flutter-Linux.tar.gz

  # 发布 Release
  release:
    name: Create Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Report All Sizes
        run: |
          echo "========================================="
          echo "   GitHub-Store-Flutter Release Sizes"
          echo "========================================="
          echo ""
          echo "Windows: $(du -sh artifacts/windows-release/GitHub-Store-Flutter-Windows.zip | cut -f1)"
          echo "macOS:   $(du -sh artifacts/macos-release/GitHub-Store-Flutter-macOS.zip | cut -f1)"
          echo "Linux:   $(du -sh artifacts/linux-release/GitHub-Store-Flutter-Linux.tar.gz | cut -f1)"
          echo ""
          echo "========================================="

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows-release/GitHub-Store-Flutter-Windows.zip
            artifacts/macos-release/GitHub-Store-Flutter-macOS.zip
            artifacts/linux-release/GitHub-Store-Flutter-Linux.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
