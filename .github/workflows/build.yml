name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.22.0'

jobs:
  build-windows:
    name: Windows Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Build Windows (Release)
        run: |
          flutter build windows --release --tree-shake-icons

      - name: Clean & Package Windows
        run: |
          $releaseDir = "build\windows\x64\runner\Release"
          Get-ChildItem "$releaseDir\*.pdb" -ErrorAction SilentlyContinue | Remove-Item -Force
          mkdir package
          Copy-Item -Recurse "$releaseDir\*" package\
          cd package
          & 7z a -mx=9 ..\GitHub-Store-Flutter-Windows.zip *
          cd ..

      - name: Report Size
        run: |
          $zipSize = (Get-Item "GitHub-Store-Flutter-Windows.zip").Length / 1MB
          Write-Host "=== Windows Build Size ==="
          Write-Host "ZIP: $([math]::Round($zipSize, 2)) MB"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: GitHub-Store-Flutter-Windows.zip

  build-macos-arm64:
    name: macOS Build (ARM64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build macOS (Release)
        run: |
          flutter build macos --release --tree-shake-icons

      - name: Optimize & Package macOS ARM64
        run: |
          APP_PATH="build/macos/Build/Products/Release/github_store_flutter.app"
          FRAMEWORKS="$APP_PATH/Contents/Frameworks"
          ARCH="arm64"

          echo "=== Step 1: Strip debug symbols ==="
          for framework in "$FRAMEWORKS"/*.framework; do
            if [ -d "$framework" ]; then
              BINARY_NAME="$(basename "$framework" .framework)"
              for BINARY_PATH in "$framework/$BINARY_NAME" "$framework/Versions/A/$BINARY_NAME"; do
                if [ -f "$BINARY_PATH" ]; then
                  echo "  Stripping: $BINARY_PATH"
                  strip -x -S "$BINARY_PATH" 2>/dev/null || true
                fi
              done
            fi
          done
          for dylib in "$FRAMEWORKS"/*.dylib; do
            if [ -f "$dylib" ]; then
              echo "  Stripping: $(basename "$dylib")"
              strip -x -S "$dylib" 2>/dev/null || true
            fi
          done

          echo "=== Step 2: Thin frameworks to $ARCH only ==="
          for framework in "$FRAMEWORKS"/*.framework; do
            if [ -d "$framework" ]; then
              BINARY_NAME="$(basename "$framework" .framework)"
              for BINARY_PATH in "$framework/Versions/A/$BINARY_NAME" "$framework/$BINARY_NAME"; do
                if [ -f "$BINARY_PATH" ]; then
                  ARCHS=$(lipo -info "$BINARY_PATH" 2>/dev/null || echo "single")
                  if echo "$ARCHS" | grep -q "arm64.*x86_64\|x86_64.*arm64"; then
                    echo "  Thinning: $BINARY_PATH -> $ARCH"
                    lipo -thin "$ARCH" -output "$BINARY_PATH" "$BINARY_PATH" 2>/dev/null || true
                  fi
                fi
              done
            fi
          done
          for dylib in "$FRAMEWORKS"/*.dylib; do
            if [ -f "$dylib" ]; then
              ARCHS=$(lipo -info "$dylib" 2>/dev/null || echo "single")
              if echo "$ARCHS" | grep -q "arm64.*x86_64\|x86_64.*arm64"; then
                echo "  Thinning: $(basename "$dylib") -> $ARCH"
                lipo -thin "$ARCH" -output "$dylib" "$dylib" 2>/dev/null || true
              fi
            fi
          done

          echo "=== Step 3: Remove system Swift dylibs ==="
          rm -f "$FRAMEWORKS"/libswift*.dylib

          echo "=== Step 4: Remove dSYM files ==="
          find "$APP_PATH" -name "*.dSYM" -type d -exec rm -rf {} + 2>/dev/null || true

          echo "=== Step 5: Rebuild framework symlinks ==="
          for framework in "$FRAMEWORKS"/*.framework; do
            if [ -d "$framework" ]; then
              BINARY_NAME="$(basename "$framework" .framework)"
              if [ -d "$framework/Versions" ]; then
                rm -f "$framework/Versions/Current"
                ln -s A "$framework/Versions/Current"
                rm -f "$framework/$BINARY_NAME"
                ln -s "Versions/Current/$BINARY_NAME" "$framework/$BINARY_NAME"
                if [ -d "$framework/Versions/A/Resources" ]; then
                  rm -f "$framework/Resources"
                  ln -s "Versions/Current/Resources" "$framework/Resources"
                fi
              fi
            fi
          done

          APP_SIZE=$(du -sh "$APP_PATH" | cut -f1)
          echo "App bundle size after optimization: $APP_SIZE"

          cd "$APP_PATH/.."
          zip -r -9 -y GitHub-Store-Flutter-macOS-ARM64.zip github_store_flutter.app/
          mv GitHub-Store-Flutter-macOS-ARM64.zip "$GITHUB_WORKSPACE/"

      - name: Report Size
        run: |
          ZIP_SIZE=$(du -sh GitHub-Store-Flutter-macOS-ARM64.zip | cut -f1)
          echo "=== macOS ARM64 Build Size ==="
          echo "ZIP: $ZIP_SIZE"
          echo ""
          echo "=== Framework Breakdown ==="
          du -sh build/macos/Build/Products/Release/github_store_flutter.app/Contents/Frameworks/* 2>/dev/null | sort -rh | head -8

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-release
          path: GitHub-Store-Flutter-macOS-ARM64.zip

  build-macos-x64:
    name: macOS Build (x86_64)
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build macOS (Release)
        run: |
          flutter build macos --release --tree-shake-icons

      - name: Optimize & Package macOS x86_64
        run: |
          APP_PATH="build/macos/Build/Products/Release/github_store_flutter.app"
          FRAMEWORKS="$APP_PATH/Contents/Frameworks"
          ARCH="x86_64"

          echo "=== Step 1: Strip debug symbols ==="
          for framework in "$FRAMEWORKS"/*.framework; do
            if [ -d "$framework" ]; then
              BINARY_NAME="$(basename "$framework" .framework)"
              for BINARY_PATH in "$framework/$BINARY_NAME" "$framework/Versions/A/$BINARY_NAME"; do
                if [ -f "$BINARY_PATH" ]; then
                  echo "  Stripping: $BINARY_PATH"
                  strip -x -S "$BINARY_PATH" 2>/dev/null || true
                fi
              done
            fi
          done
          for dylib in "$FRAMEWORKS"/*.dylib; do
            if [ -f "$dylib" ]; then
              echo "  Stripping: $(basename "$dylib")"
              strip -x -S "$dylib" 2>/dev/null || true
            fi
          done

          echo "=== Step 2: Thin frameworks to $ARCH only ==="
          for framework in "$FRAMEWORKS"/*.framework; do
            if [ -d "$framework" ]; then
              BINARY_NAME="$(basename "$framework" .framework)"
              for BINARY_PATH in "$framework/Versions/A/$BINARY_NAME" "$framework/$BINARY_NAME"; do
                if [ -f "$BINARY_PATH" ]; then
                  ARCHS=$(lipo -info "$BINARY_PATH" 2>/dev/null || echo "single")
                  if echo "$ARCHS" | grep -q "arm64.*x86_64\|x86_64.*arm64"; then
                    echo "  Thinning: $BINARY_PATH -> $ARCH"
                    lipo -thin "$ARCH" -output "$BINARY_PATH" "$BINARY_PATH" 2>/dev/null || true
                  fi
                fi
              done
            fi
          done
          for dylib in "$FRAMEWORKS"/*.dylib; do
            if [ -f "$dylib" ]; then
              ARCHS=$(lipo -info "$dylib" 2>/dev/null || echo "single")
              if echo "$ARCHS" | grep -q "arm64.*x86_64\|x86_64.*arm64"; then
                echo "  Thinning: $(basename "$dylib") -> $ARCH"
                lipo -thin "$ARCH" -output "$dylib" "$dylib" 2>/dev/null || true
              fi
            fi
          done

          echo "=== Step 3: Remove system Swift dylibs ==="
          rm -f "$FRAMEWORKS"/libswift*.dylib

          echo "=== Step 4: Remove dSYM files ==="
          find "$APP_PATH" -name "*.dSYM" -type d -exec rm -rf {} + 2>/dev/null || true

          echo "=== Step 5: Rebuild framework symlinks ==="
          for framework in "$FRAMEWORKS"/*.framework; do
            if [ -d "$framework" ]; then
              BINARY_NAME="$(basename "$framework" .framework)"
              if [ -d "$framework/Versions" ]; then
                rm -f "$framework/Versions/Current"
                ln -s A "$framework/Versions/Current"
                rm -f "$framework/$BINARY_NAME"
                ln -s "Versions/Current/$BINARY_NAME" "$framework/$BINARY_NAME"
                if [ -d "$framework/Versions/A/Resources" ]; then
                  rm -f "$framework/Resources"
                  ln -s "Versions/Current/Resources" "$framework/Resources"
                fi
              fi
            fi
          done

          APP_SIZE=$(du -sh "$APP_PATH" | cut -f1)
          echo "App bundle size after optimization: $APP_SIZE"

          cd "$APP_PATH/.."
          zip -r -9 -y GitHub-Store-Flutter-macOS-x64.zip github_store_flutter.app/
          mv GitHub-Store-Flutter-macOS-x64.zip "$GITHUB_WORKSPACE/"

      - name: Report Size
        run: |
          ZIP_SIZE=$(du -sh GitHub-Store-Flutter-macOS-x64.zip | cut -f1)
          echo "=== macOS x86_64 Build Size ==="
          echo "ZIP: $ZIP_SIZE"
          echo ""
          echo "=== Framework Breakdown ==="
          du -sh build/macos/Build/Products/Release/github_store_flutter.app/Contents/Frameworks/* 2>/dev/null | sort -rh | head -8

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64-release
          path: GitHub-Store-Flutter-macOS-x64.zip

  build-linux:
    name: Linux Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libayatana-appindicator3-dev libsecret-1-dev

      - name: Get dependencies
        run: flutter pub get

      - name: Build Linux (Release)
        run: |
          flutter build linux --release --tree-shake-icons

      - name: Strip & Package Linux
        run: |
          BUNDLE_DIR="build/linux/x64/release/bundle"

          echo "=== Stripping debug symbols ==="
          for lib in "$BUNDLE_DIR"/lib/*.so; do
            if [ -f "$lib" ]; then
              echo "  Stripping: $(basename "$lib")"
              strip --strip-unneeded "$lib" 2>/dev/null || true
            fi
          done

          strip --strip-unneeded "$BUNDLE_DIR/github_store_flutter" 2>/dev/null || true
          rm -rf "$BUNDLE_DIR/debug" "$BUNDLE_DIR/lib/debug" 2>/dev/null || true

          mkdir -p package
          cp -r "$BUNDLE_DIR"/* package/
          cd package
          tar -czf ../GitHub-Store-Flutter-Linux.tar.gz *
          cd ..

      - name: Report Size
        run: |
          TAR_SIZE=$(du -sh GitHub-Store-Flutter-Linux.tar.gz | cut -f1)
          echo "=== Linux Build Size ==="
          echo "TAR.GZ: $TAR_SIZE"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: GitHub-Store-Flutter-Linux.tar.gz

  release:
    name: Create Release
    needs: [build-windows, build-macos-arm64, build-macos-x64, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Report All Sizes
        run: |
          echo "========================================="
          echo "   GitHub-Store-Flutter Release Sizes"
          echo "========================================="
          echo ""
          echo "Windows:      $(du -sh artifacts/windows-release/GitHub-Store-Flutter-Windows.zip | cut -f1)"
          echo "macOS ARM64:  $(du -sh artifacts/macos-arm64-release/GitHub-Store-Flutter-macOS-ARM64.zip | cut -f1)"
          echo "macOS x86_64: $(du -sh artifacts/macos-x64-release/GitHub-Store-Flutter-macOS-x64.zip | cut -f1)"
          echo "Linux:        $(du -sh artifacts/linux-release/GitHub-Store-Flutter-Linux.tar.gz | cut -f1)"
          echo ""
          echo "========================================="

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows-release/GitHub-Store-Flutter-Windows.zip
            artifacts/macos-arm64-release/GitHub-Store-Flutter-macOS-ARM64.zip
            artifacts/macos-x64-release/GitHub-Store-Flutter-macOS-x64.zip
            artifacts/linux-release/GitHub-Store-Flutter-Linux.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
