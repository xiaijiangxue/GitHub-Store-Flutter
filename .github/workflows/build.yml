name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.29.0'

jobs:
  build-windows:
    name: Windows Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      # === 关键优化: Release 模式 + Tree Shaking ===
      - name: Build Windows (Release)
        run: |
          flutter build windows `
            --release `
            --tree-shake-icons `
            --obfuscate `
            --split-debug-info=debug-info

      # 打包为 zip (只包含运行所需文件, 排除 debug-info)
      - name: Package Windows
        run: |
          mkdir package
          cp -r build/windows/x64/runner/Release/* package/
          cd package
          7z a ../GitHub-Store-Flutter-Windows.zip *
          cd ..

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: GitHub-Store-Flutter-Windows.zip

      - name: Get file size
        run: |
          $size = (Get-Item "GitHub-Store-Flutter-Windows.zip").Length / 1MB
          Write-Host "Windows zip size: $([math]::Round($size, 2)) MB"
          $folderSize = (Get-ChildItem -Recurse package | Measure-Object -Property Length -Sum).Sum / 1MB
          Write-Host "Windows folder size: $([math]::Round($folderSize, 2)) MB"

  build-macos:
    name: macOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build macOS (Release)
        run: |
          flutter build macos \
            --release \
            --tree-shake-icons

      - name: Package macOS
        run: |
          mkdir -p package/GitHub-Store-Flutter.app
          cp -r build/macos/Build/Products/Release/GitHub-Store-Flutter.app/* package/GitHub-Store-Flutter.app/
          cd package
          zip -r -9 ../GitHub-Store-Flutter-macOS.zip GitHub-Store-Flutter.app/
          cd ..

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: GitHub-Store-Flutter-macOS.zip

      - name: Get file size
        run: |
          echo "macOS zip size: $(du -sh GitHub-Store-Flutter-macOS.zip | cut -f1)"

  build-linux:
    name: Linux Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libayatana-appindicator3-dev libsecret-1-dev

      - name: Get dependencies
        run: flutter pub get

      - name: Build Linux (Release)
        run: |
          flutter build linux \
            --release \
            --tree-shake-icons

      - name: Package Linux
        run: |
          mkdir -p package
          cp -r build/linux/x64/release/bundle/* package/
          cd package
          tar -czf ../GitHub-Store-Flutter-Linux.tar.gz *
          cd ..

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: GitHub-Store-Flutter-Linux.tar.gz

      - name: Get file size
        run: |
          echo "Linux tar.gz size: $(du -sh GitHub-Store-Flutter-Linux.tar.gz | cut -f1)"

  # 发布 Release
  release:
    name: Create Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List files
        run: |
          echo "=== 打包文件大小 ==="
          ls -lh artifacts/windows-release/GitHub-Store-Flutter-Windows.zip
          ls -lh artifacts/macos-release/GitHub-Store-Flutter-macOS.zip
          ls -lh artifacts/linux-release/GitHub-Store-Flutter-Linux.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows-release/GitHub-Store-Flutter-Windows.zip
            artifacts/macos-release/GitHub-Store-Flutter-macOS.zip
            artifacts/linux-release/GitHub-Store-Flutter-Linux.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
